services:
  # Your existing Node.js backend (MIRA main app)
  - type: web
    name: mira-backend
    runtime: node
    repo: https://karuoya03.github.io/MIRA/  # replace with your repo URL
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mira-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 20
      # Add your other env vars (EMAIL_USER, EMAIL_PASS, GOOGLE_SHEETS_ID, GOOGLE_CREDENTIALS_JSON, etc.)
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: APP_URL
        sync: false

  # n8n automation service
  - type: web
    name: mira-n8n
    runtime: image
    repo: https://karuoya03.github.io/MIRA/
    plan: free
    dockerfilePath: ./Dockerfile.n8n
    envVars:
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false        # you'll set this manually in Render dashboard
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false        # set manually
      - key: WEBHOOK_URL
        sync: false        # set to your n8n service URL after deployment
      - key: DATABASE_URL
        fromDatabase:
          name: mira-n8n-db
          property: connectionString
    disks:
      - name: n8n-data
        mountPath: /root/.n8n
        sizeGB: 1

databases:
  - name: mira-db
    plan: free
  - name: mira-n8n-db
    plan: free
