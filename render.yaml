services:
  # Your existing Node.js backend (MIRA main app)
  - type: web
    name: mira-backend
    runtime: node
    repo: https://github.com/karuoya03/MIRA.git
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mira-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 20
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: APP_URL
        sync: false

  # n8n automation service – using public Docker image
  - type: web
    name: mira-n8n
    runtime: image
    image: n8nio/n8n:latest
    plan: free
    envVars:
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mira-n8n-db
          property: connectionString
    # No disks needed – n8n will use PostgreSQL for storage

databases:
  - name: mira-db
    plan: free
  - name: mira-n8n-db
    plan: free
